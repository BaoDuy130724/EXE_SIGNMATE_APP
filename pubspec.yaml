name: sign_language_app
description: Sign Language Learning App with AI-powered real-time feedback
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1

  # Navigation & State
  go_router: ^17.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Camera & AI
  camera: ^0.10.5+9
  google_generative_ai: ^0.4.0
  image: ^4.1.4

  # Utilities
  intl: ^0.19.0
  http: ^1.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.2.0
  video_player: ^2.8.2
  audioplayers: ^6.6.0
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_commons: ^0.11.1
  webview_flutter: ^4.13.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
